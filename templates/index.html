<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>311 Chat Assistant</title>
    <link rel="stylesheet" href="/static/css/chat.css">
</head>
<body>
    <div id="chat-bubble" class="chat-bubble">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
        </svg>
    </div>
    <div id="chat-window" class="chat-window hidden">
        <div class="chat-header">
            <div class="header-content">
                <h3>311 AI Assistant</h3>
                <p>How can we help you today?</p>
            </div>
            <button id="close-chat" class="close-button">×</button>
        </div>
        <div id="chat-messages" class="chat-messages">
            <div class="message assistant-message">
                <div class="message-content">
                    Hello! I'm your 311 AI Assistant. I can help you report issues like potholes, graffiti, streetlight outages, and more. What can I help you with today?
                </div>
            </div>
        </div>
        <div class="chat-input-container">
            <div id="photo-preview" class="photo-preview hidden"></div>
            <div class="input-wrapper">
                <input type="file" id="photo-input" accept="image/*" class="hidden">
                <button id="photo-button" class="photo-button" title="Attach photo">📷</button>
                <input type="text" id="chat-input" placeholder="Type your message..." autocomplete="off">
                <button id="send-button" class="send-button">Send</button>
            </div>
        </div>
    </div>
    <script src="/static/js/chat.js"></script>
</body>
</html>
